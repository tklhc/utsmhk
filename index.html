<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MİHENK Üretim Takip Sistemi</title>
<style>
  :root, [data-theme="dark"] {
    --bg-body: #0f172a; --bg-app: #0f1219; --bg-sidebar: linear-gradient(180deg,#0f1219 0%,#151b2b 100%);
    --bg-modal: #1a1f2e; --bg-input: #1e293b; --bg-card: rgba(255,255,255,0.03); --bg-hover: rgba(255,255,255,0.04);
    --bg-subtle: rgba(255,255,255,0.02); --bg-topbar: rgba(255,255,255,0.02);
    --text: #e2e8f0; --text-h: #f1f5f9; --text-sec: #94a3b8; --text-mute: #64748b; --text-dim: #475569;
    --border: rgba(255,255,255,0.06); --border-h: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.1);
    --scrollbar-track: #1e293b; --scrollbar-thumb: #475569;
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.5);
    color-scheme: dark;
  }
  [data-theme="light"] {
    --bg-body: #f1f5f9; --bg-app: #f8fafc; --bg-sidebar: linear-gradient(180deg,#ffffff 0%,#f1f5f9 100%);
    --bg-modal: #ffffff; --bg-input: #f1f5f9; --bg-card: rgba(0,0,0,0.02); --bg-hover: rgba(0,0,0,0.03);
    --bg-subtle: rgba(0,0,0,0.01); --bg-topbar: rgba(0,0,0,0.02);
    --text: #1e293b; --text-h: #0f172a; --text-sec: #475569; --text-mute: #64748b; --text-dim: #94a3b8;
    --border: rgba(0,0,0,0.08); --border-h: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.15);
    --scrollbar-track: #e2e8f0; --scrollbar-thumb: #94a3b8;
    --shadow-modal: 0 20px 60px rgba(0,0,0,0.15);
    color-scheme: light;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-body); color: var(--text); -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
  select option { background: var(--bg-input); color: var(--text); }
  input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }
  @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton { background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
  /* Mobile table scroll */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl-wrap table { min-width: 600px; }
  /* Mobile tweaks */
  @media (max-width: 768px) {
    .tbl-wrap table { min-width: 500px; }
    .hide-mobile { display: none !important; }
    .grid-mobile-1 { grid-template-columns: 1fr !important; }
    .grid-mobile-2 { grid-template-columns: 1fr 1fr !important; }
    .modal-mobile { width: 100% !important; max-width: 100% !important; border-radius: 12px 12px 0 0 !important; max-height: 92vh !important; padding: 16px !important; }
    .modal-backdrop-mobile { align-items: flex-end !important; }
    input, select, textarea { font-size: 16px !important; } /* prevent iOS zoom */
    button { min-height: 38px; }
    /* Card layout: stack side-by-side content */
    .mob-stack { flex-direction: column !important; align-items: flex-start !important; }
    .mob-stack > * { width: 100%; }
    /* WO card header: wrap badges */
    .mob-wrap { flex-wrap: wrap !important; gap: 6px !important; }
    /* Action buttons: horizontal scroll instead of wrap */
    .mob-actions { flex-wrap: wrap !important; gap: 6px !important; }
    .mob-actions > button { flex: 1 1 auto; min-width: 0; }
    /* QC header: allow wrapping */
    .mob-qc-head { flex-wrap: wrap !important; gap: 6px !important; }
    .mob-qc-head > span:last-child { margin-left: 0 !important; }
    /* Production card: stack content and actions */
    .mob-prod-card { flex-direction: column !important; gap: 10px !important; }
    .mob-prod-card > div:last-child { flex-direction: row !important; align-items: center !important; flex-wrap: wrap !important; }
    /* Filter bar: stack vertically */
    .mob-filter-grid { grid-template-columns: 1fr 1fr !important; }
    /* Make stats grid smaller */
    .mob-stats { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
    /* Full width buttons on mobile */
    .mob-full-btn { width: 100% !important; justify-content: center !important; }
    /* Smaller padding for cards */
    .mob-compact { padding: 12px !important; }
    /* Compact text */
    .mob-text-sm { font-size: 12px !important; }
    /* Overflow hidden with ellipsis */
    .mob-truncate { overflow: hidden !important; text-overflow: ellipsis !important; white-space: nowrap !important; max-width: 200px !important; }
  }
  @media (max-width: 480px) {
    .mob-stats { grid-template-columns: 1fr 1fr !important; }
    .mob-filter-grid { grid-template-columns: 1fr !important; }
    .tbl-wrap table { min-width: 400px; }
  }
  @media print { body { background: white; color: black; } }
</style>
